<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi PDF RAG Chatbot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📚 Multi PDF RAG Chatbot</h1>

    <div class="upload-box">

        <input
            type="file"
            id="pdfFiles"
            accept=".pdf"
            multiple>

        <button id="uploadBtn">
            Upload & Index
        </button>

        <div id="status"></div>

    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">

        <input
            type="text"
            id="question"
            placeholder="Ask something about your PDFs...">

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
