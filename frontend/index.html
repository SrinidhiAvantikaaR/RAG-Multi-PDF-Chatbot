<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi PDF RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📚 Multi PDF RAG Chatbot</h1>

    <div class="upload-box">

        <input
            type="file"
            id="pdfFiles"
            multiple
            accept=".pdf">

        <button id="uploadBtn">
            Upload & Index
        </button>

        <div id="status"></div>

    </div>

    <div class="chat-container">

        <div id="chatBox"></div>

        <div class="input-area">

            <input
                id="question"
                placeholder="Ask anything from your PDFs...">

            <button id="sendBtn">
                Send
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
